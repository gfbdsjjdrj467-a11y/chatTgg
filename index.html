<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ChatTgg — web demo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <header class="sidebar-header">
        <h1>ChatTgg</h1>
      </header>
      <div class="chats">
        <div class="chat active">
          <div class="avatar">А</div>
          <div class="meta">
            <div class="name">Алекс</div>
            <div class="preview">Привет! Как дела?</div>
          </div>
        </div>
        <div class="chat">
          <div class="avatar">Б</div>
          <div class="meta">
            <div class="name">Бот</div>
            <div class="preview">Новый фича-релиз</div>
          </div>
        </div>
      </div>
    </aside>

    <main class="chat-panel">
      <header class="chat-header">
        <div class="title">Алекс</div>
        <div class="actions">
          <button class="icon-btn">⋮</button>
        </div>
      </header>

      <div class="messages" id="messages">
        <div class="message incoming">
          <div class="bubble">Привет! Я демонстрационная версия чата.</div>
        </div>
        <div class="message outgoing">
          <div class="bubble">Круто — сделаем сайт похожим на Telegram.</div>
        </div>
      </div>

      <form class="composer" id="composer">
        <input id="input" placeholder="Напишите сообщение..." autocomplete="off">
        <button id="send" class="send-btn" type="submit" aria-label="Send">
          <span class="send-icon">➤</span>
        </button>
      </form>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
